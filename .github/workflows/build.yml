name: Java CI mit Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Java 21 einrichten
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Plugin mit Maven bauen
      run: mvn -B package --file pom.xml

    - name: Fertige JAR hochladen
      uses: actions/upload-artifact@v4
      with:
        name: DicePlugin-Build
        path: target/*.jar
        
